name: flutter_realtime_chat_marketplace
description: Real-time buyer-seller chat for marketplace apps. Flutter + Riverpod + Supabase Realtime.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  supabase_flutter: ^2.5.6
  go_router: ^14.2.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.10
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
